<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - La Costanera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles-base.css">
    <style>
        /* Estilos específicos para usuarios */
        .password-hidden {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            color: var(--dark);
        }
        
        .rol-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
            margin: 2px;
            background: var(--accent);
            color: var(--dark);
        }
        
        .rol-admin {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .rol-vendedor {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        
        .rol-consulta {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }
        
        .resumen-usuarios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .resumen-card {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        .resumen-card::before {
            content: "👤";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 80px;
            opacity: 0.2;
            transform: rotate(15deg);
        }
        
        .resumen-card .numero {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .resumen-card .etiqueta {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .personal-info {
            font-size: 0.85em;
            color: var(--success);
            margin-top: 5px;
            padding: 3px 8px;
            background: var(--light);
            border-radius: 15px;
            display: inline-block;
        }
        
        .personal-info i {
            margin-right: 5px;
        }
        
        .roles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        
        .acciones-usuario {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-end;
        }
        
        .btn-rol {
            background: var(--accent);
            color: var(--dark);
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .btn-rol:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-user-circle"></i>
            Gestión de Usuarios
        </h1>
        
        <!-- Barra de búsqueda principal -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre de usuario...">
            <select id="searchField">
                <option value="todos">Todos los campos</option>
                <option value="nombre_usuario">Nombre de Usuario</option>
            </select>
            <button onclick="buscarUsuarios()">
                <i class="fas fa-search"></i> Buscar
            </button>
            <button onclick="limpiarBusqueda()" style="background: var(--accent); color: var(--dark);">
                <i class="fas fa-times"></i> Limpiar
            </button>
        </div>
        
        <!-- Resumen de usuarios -->
        <div class="resumen-usuarios" id="resumen">
            <div class="resumen-card">
                <div class="numero" id="totalUsuarios">0</div>
                <div class="etiqueta">Total Usuarios</div>
            </div>
            <div class="resumen-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                <div class="numero" id="conPersonal">0</div>
                <div class="etiqueta">Con Personal Asociado</div>
            </div>
            <div class="resumen-card" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">
                <div class="numero" id="sinPersonal">0</div>
                <div class="etiqueta">Sin Personal</div>
            </div>
            <div class="resumen-card" style="background: linear-gradient(135deg, #ec4899, #db2777);">
                <div class="numero" id="totalRoles">0</div>
                <div class="etiqueta">Roles Asignados</div>
            </div>
        </div>
        
        <!-- Lista de usuarios -->
        <div id="listado">
            <ul id="data"></ul>
        </div>
    </div>
    
    <!-- Modal para ver/editar roles (opcional) -->
    <div id="modalRoles" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 id="modalTitulo">Asignar Roles</h3>
            <div id="modalContenido"></div>
        </div>
    </div>
    
    <script src="usuario_get.js"></script>
</body>
</html>
