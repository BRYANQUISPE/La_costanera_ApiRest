<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - La Costanera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles-base.css">
    <style>
        /* Estilos adicionales específicos para clientes */
        .stats-card {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white;
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-item .number {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-item .label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-users"></i>
            Gestión de Clientes
        </h1>
        
        <!-- Barra de búsqueda mejorada -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre, CI o email...">
            <select id="searchField">
                <option value="todos">Todos los campos</option>
                <option value="nombre">Nombre</option>
                <option value="ci">CI</option>
                <option value="email">Email</option>
            </select>
            <button onclick="buscarClientes()">
                <i class="fas fa-search"></i> Buscar
            </button>
            <button onclick="limpiarBusqueda()" style="background: var(--accent); color: var(--dark);">
                <i class="fas fa-times"></i> Limpiar
            </button>
        </div>
        
        <!-- Estadísticas rápidas -->
        <div class="stats-card" id="stats">
            <div class="stat-item">
                <div class="number" id="totalClientes">0</div>
                <div class="label">Total Clientes</div>
            </div>
            <div class="stat-item">
                <div class="number" id="clientesActivos">0</div>
                <div class="label">Con Reservas</div>
            </div>
            <div class="stat-item">
                <div class="number" id="clientesVIP">0</div>
                <div class="label">Clientes VIP</div>
            </div>
        </div>
        
        <!-- Lista de clientes -->
        <div id="listado">
            <ul id="data"></ul>
        </div>
    </div>
    
    <script src="cliente_get.js"></script>
</body>
</html>
